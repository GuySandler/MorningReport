<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Report</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <header class="app-header">
        <h1 class="app-title">Morning Report</h1>
        
        <div id="quoteOfTheDay" class="header-quote">
            <!-- Loaded via JS -->
        </div>

        <button class="fab-button" onclick="window.location.href='settings.html'">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor"><path d="M160-400v-80h280v80H160Zm0-160v-80h440v80H160Zm0-160v-80h440v80H160Zm360 480v-160h40v58h240v44H560v58h-40Z"/></svg>
            Settings
        </button>
    </header>

    <main class="dashboard-grid">
        <div id="weather" class="card primary-container span-wide">
            <div id="AIWeather" class="ai-box">Weather Summary Loading...</div>
            <div class="weather-grid">
                <div id="temperature" class="stat"></div>
                <div id="apparent_temp" class="stat"></div>
                <div id="precipitation" class="stat"></div>
                <div id="humidity" class="stat"></div>
                <div id="cloud_cover" class="stat"></div>
                <div id="wind_speed" class="stat"></div>
            </div>
        </div>
        
        <div id="traffic" class="card secondary-container span-normal">
            <h2>Commute</h2>
            <h3 id="trafficTime"></h3>
            <p id="trafficDistance"></p>
            <div class="map-container">
                <div id="map"></div>
            </div>
        </div>

        <div id="news" class="card surface-variant span-wide">
            <h2>Latest News</h2>
            <div id="aiSummary" class="ai-box"></div>
            <div id="newsContainer"></div>
        </div>

        <div id="stocks" class="card tertiary-container span-normal">
            <h2>Stock Market</h2>
            <div id="stockContainer"></div>
            <div class="chart-container">
                <canvas id="stockChart"></canvas>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/weather.js"></script>
    <script src="js/traffic.js"></script>
    <script src="js/news.js"></script>
    <script src="js/mindfulness.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="js/stocks.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js"></script>
</body>
</html>
