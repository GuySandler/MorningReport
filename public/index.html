<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MorningReport</title>
</head>
<body>
    <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
    <button onclick="window.location.href='settings.html'">Settings</button>
    <h1>Morning Report</h1>

    <div id="weather">
        <div id="AIWeather">Weather Summary Loading...</div>
        <div id="temperature"></div>
        <div id="apparent_temp"></div>
        <div id="precipitation"></div>
        <div id="humidity"></div>
        <div id="cloud_cover"></div>
        <div id="visibility"></div>
        <div id="wind_speed"></div>
    </div>
    

    <div id="traffic">
        <h1 id="trafficTime"></h1>
        <h1 id="trafficDistance"></h1>
        <div id="map" style="height: 75vw; width: 75vw;"></div>

        </div>
    </div>

    <div id="news">
        <h2>Latest News</h2>
        <div id="newsContainer"></div>
        <div id="aiSummary"></div>
    </div>

    <div id="stocks">
        <h2>Stock Market</h2>
        <div id="stockContainer"></div>
        <canvas id="stockChart" style="width:100%;max-width:700px"></canvas>
    </div>

    <style>
        #aiSummary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 15px;
            line-height: 1.6;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        #aiSummary h2 {
            color: white;
            margin-bottom: 15px;
            font-size: 18px;
        }

        #aiSummary p {
            margin-bottom: 10px;
        }
    </style>

    <div id="quoteOfTheDay">

    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/weather.js"></script>
    <script src="js/traffic.js"></script>
    <script src="js/news.js"></script>
    <script src="js/mindfulness.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="js/stocks.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js"></script>
</body>
</html>
