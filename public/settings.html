<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Morning Report</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="settings-body">
    <header class="app-header">
        <h1>Settings</h1>
        <button class="fab-button" onclick="window.location.href='index.html'">Back to Dashboard</button>
    </header>

    <main class="dashboard-grid single-column">
        <div class="card secondary-container">
            <h2>Traffic Preferences</h2>
            <div class="input-group">
                <label for="commuteStart">Commute Start Address</label>
                <input type="text" id="commuteStart" placeholder="e.g. 123 Main St, City, State">
            </div>
            <div class="input-group">
                <label for="commuteEnd">Commute End Address</label>
                <input type="text" id="commuteEnd" placeholder="e.g. 456 Work Blvd, City, State">
            </div>
        </div>

        <div class="card tertiary-container">
            <h2>Financial Preferences</h2>
            <div class="input-group">
                <label for="stockSymbol">Stock Symbol</label>
                <input type="text" id="stockSymbol" placeholder="e.g. AAPL">
            </div>
        </div>
    </main>
    
    <script src="js/settings.js"></script>
</body>
</html>
